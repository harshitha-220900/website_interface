<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | An!mStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styling/external.css" />
</head>

<body>
  <header>
    <div class="logo">An!mStream</div>
    <nav>
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-form">
      <h1>Create Account</h1>
      <form action="#">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required />
        </div>
        <button type="submit" class="auth-btn">Sign Up</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </main>

  <footer style="padding: 2rem; text-align: center; color: var(--text-secondary);">
    <p>&copy; 2024 An!mStream. All rights reserved.</p>
  </footer>
</body>

</html>
